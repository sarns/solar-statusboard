        // Clear screen for this page
        it.fill(COLOR_WHITE);
        color_off = COLOR_WHITE;
        color_on = COLOR_BLACK;
        // widget:rounded_rect id:w_mqaph5ejq833r type:rounded_rect x:490 y:200 w:450 h:320
                {
