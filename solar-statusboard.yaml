esphome:
  name: solar-statusboard
  friendly_name: solar-statusboard
  on_boot:
    priority: 300
    then:
      - delay: 2s
      - script.execute: manage_run_and_sleep

# Replace this with your actual platform if you aren't using ESP32.
logger:

api:
  encryption:
    key: "xyVdZVBQdzb0lp7Hc9eMrHpfRwiT6xd6z3YPmWkwp2I="

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source: github://jesuli87/esphomeStuff
    components:
      - t547
    refresh: always

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_SPIRAM: "y"
      CONFIG_SPIRAM_MODE_OCT: "y"
      CONFIG_SPIRAM_SPEED_80M: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_RMT_ENABLE_LEGACY_DRIVER: "y"

